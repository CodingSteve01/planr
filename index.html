<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Planr — Project Scheduler</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230a0c10'/><rect x='5' y='5' width='22' height='22' rx='4' fill='none' stroke='%234f8ef7' stroke-width='1.5'/><line x1='9' y1='11' x2='23' y2='11' stroke='%234f8ef7' stroke-width='1.5' stroke-linecap='round'/><line x1='9' y1='16' x2='19' y2='16' stroke='%2322c55e' stroke-width='1.5' stroke-linecap='round'/><line x1='9' y1='21' x2='21' y2='21' stroke='%23f59e0b' stroke-width='1.5' stroke-linecap='round'/></svg>">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--bg2:#111318;--bg3:#181c24;--bg4:#1f2433;--bg5:#252d40;
  --b:#1e2535;--b2:#2a3348;--b3:#3a4560;
  --tx:#e2e8f8;--tx2:#8892aa;--tx3:#505870;
  --ac:#4f8ef7;--ac2:#2563eb;
  --gr:#22c55e;--am:#f59e0b;--re:#f43f5e;--pu:#a78bfa;
  --r:7px;--r2:11px;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --sh:0 4px 24px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:3px;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{display:flex;align-items:center;gap:8px;padding:0 16px;height:48px;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;}
.logo{font-size:15px;font-weight:700;letter-spacing:-.5px;cursor:pointer;user-select:none;}
.logo-dot{color:var(--ac);}
.vsep{width:1px;height:18px;background:var(--b2);flex-shrink:0;}
.sp{flex:1;}
.tab-bar{display:flex;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;}
.tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:color .12s,border-color .12s;letter-spacing:.01em;user-select:none;}
.tab:hover{color:var(--tx2);}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);}
.main{flex:1;overflow:hidden;display:flex;}
.pane{flex:1;overflow:auto;padding:20px;}
.pane-full{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);transition:all .12s;white-space:nowrap;line-height:1;}
.btn:active{transform:scale(.97);}
.btn-pri{background:var(--ac2);color:#fff;}.btn-pri:hover{background:var(--ac);}
.btn-sec{background:var(--bg3);color:var(--tx2);border:1px solid var(--b2);}.btn-sec:hover{background:var(--bg4);color:var(--tx);}
.btn-ghost{background:transparent;color:var(--tx3);}.btn-ghost:hover{color:var(--tx2);background:var(--bg3);}
.btn-danger{background:transparent;color:var(--re);border:1px solid var(--b2);}.btn-danger:hover{background:#2d0a10;border-color:var(--re);}
.btn-sm{padding:4px 9px;font-size:11px;}.btn-xs{padding:2px 6px;font-size:10px;}
.btn-icon{padding:5px;justify-content:center;border-radius:var(--r);}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.04em;font-family:var(--mono);white-space:nowrap;}
.bd{background:#0d2a14;color:#4ade80;border:1px solid #1a4428;}
.bw{background:#292008;color:#fbbf24;border:1px solid #4a3a10;}
.bo{background:var(--bg3);color:var(--tx3);border:1px solid var(--b2);}
.bp1{background:#2d0a10;color:#fb7185;border:1px solid #5a1020;}
.bp2{background:#292008;color:#fbbf24;border:1px solid #4a3a10;}
.bp3{background:#0d1f3a;color:#60a5fa;border:1px solid #1a3a6a;}
.bp4{background:var(--bg3);color:var(--tx3);border:1px solid var(--b2);}
.bc{background:#2d0a10;color:#fb7185;border:1px solid var(--re);}
.bh{background:#292008;color:#fbbf24;border:1px solid var(--am);}
.b-cp{background:#3d0a0e;color:#fda4af;border:1px solid #7f1d1d;}
.field{margin-bottom:12px;}
.field>label{display:block;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);color:var(--tx);font-family:var(--font);font-size:12px;padding:7px 10px;outline:none;transition:border-color .12s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ac);}
.field input[type=number]{font-family:var(--mono);}
.field textarea{resize:vertical;min-height:56px;}
.field select option{background:var(--bg3);}
.field input[type=color]{height:34px;padding:3px 5px;cursor:pointer;}
.frow{display:flex;gap:10px;}.frow .field{flex:1;}
.calc{background:var(--bg3);border-radius:var(--r);padding:8px 12px;font-family:var(--mono);font-size:11px;color:var(--tx3);display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;}
.calc b{color:var(--gr);}.calc .cp{color:var(--re);}
.helper{font-size:11px;color:var(--tx3);margin-top:3px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r2);padding:22px;width:min(560px,100%);max-height:88vh;overflow-y:auto;box-shadow:var(--sh);}
.modal-lg{width:min(720px,100%);}
.modal h2{font-size:15px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--b);}
.tag{display:inline-flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--b2);border-radius:4px;padding:2px 6px;font-size:10px;font-family:var(--mono);color:var(--tx3);margin:2px;}
.tag-x{cursor:pointer;opacity:.6;}.tag-x:hover{opacity:1;color:var(--re);}
.tree-tbl{width:100%;border-collapse:collapse;}
.tree-tbl th{padding:6px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--bg);z-index:2;white-space:nowrap;}
.tree-tbl th.r{text-align:right;}
.tr{border-bottom:1px solid var(--b);cursor:pointer;transition:background .08s;}
.tr:hover td{background:var(--bg3)!important;}
.tr.sel td{background:#0d1f3a!important;}
.tr.l1 td{background:#111318;}
.tr.l2 td{background:#0e1118;}
.tr.cp-row td{border-left:2px solid #7f1d1d!important;}
.tr td{padding:5px 10px;vertical-align:middle;}
.tid{font-family:var(--mono);font-size:10px;color:var(--tx3);}
.tn{font-size:12px;}
.tn.l1{font-size:13px;font-weight:600;color:var(--tx);}
.tn.l2{font-weight:500;color:var(--tx2);}
.nc{font-family:var(--mono);font-size:11px;text-align:right;color:var(--tx2);}
.nc.g{color:var(--gr);font-weight:500;}
.note-inline{font-size:10px;color:var(--tx3);margin-left:6px;}
.side{width:360px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.side-hdr{padding:12px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.side-hdr h3{font-size:12px;font-weight:600;font-family:var(--mono);flex:1;color:var(--tx2);}
.side-body{padding:14px;overflow-y:auto;flex:1;}
.gantt{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.gantt-hdr{display:flex;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--b);z-index:5;}
.gh-fix{width:300px;flex-shrink:0;border-right:1px solid var(--b);padding:6px 10px 4px;display:flex;align-items:flex-end;}
.gh-scroll{flex:1;overflow:hidden;}
.gantt-body{flex:1;overflow:hidden;display:flex;}
.gantt-left{width:300px;flex-shrink:0;border-right:1px solid var(--b);overflow-y:hidden;}
.gteam{height:32px;display:flex;align-items:center;padding:0 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--b2);position:sticky;top:0;z-index:3;}
.grow-l{height:28px;display:flex;align-items:center;gap:6px;padding:0 10px;border-bottom:1px solid var(--b);cursor:pointer;overflow:hidden;transition:background .08s;}
.grow-l:hover{background:var(--bg3);}
.grow-l.cp-row{border-left:2px solid #7f1d1d;}
.grow-r{height:28px;position:relative;border-bottom:1px solid var(--b);}
.gbar{position:absolute;top:4px;height:20px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:500;overflow:hidden;white-space:nowrap;z-index:2;transition:filter .1s;user-select:none;}
.gbar:hover{filter:brightness(1.2);}
.gbar.dragging{opacity:.85;box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:10;cursor:grabbing;}
.gbar.cp-bar{box-shadow:inset 0 0 0 1.5px var(--re)!important;}
.gantt-footer{flex-shrink:0;display:flex;gap:8px;padding:6px 12px;border-top:1px solid var(--b);background:var(--bg2);flex-wrap:wrap;align-items:center;}
.netgraph-wrap{flex:1;overflow:hidden;position:relative;}
.ng-toolbar{position:absolute;top:12px;right:12px;display:flex;gap:6px;z-index:10;}
.ng-legend{position:absolute;bottom:12px;left:12px;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:10px 14px;font-size:11px;display:flex;gap:16px;flex-wrap:wrap;z-index:10;}
.ng-li{display:flex;align-items:center;gap:6px;color:var(--tx2);}
.ng-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sum-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.sum-card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:12px 16px;flex:1;min-width:100px;}
.sum-v{font-family:var(--mono);font-size:22px;font-weight:600;line-height:1.2;}
.sum-l{font-size:10px;color:var(--tx3);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
.section-h{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin:18px 0 8px;}
.section-h:first-child{margin-top:0;}
.dl-bar{background:#1a0a0e;border:1px solid #5a1020;border-radius:var(--r);padding:10px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.dl-bar.hi{background:#1a1200;border-color:#5a4010;}
.prog-wrap{height:4px;background:var(--bg3);border-radius:2px;margin-top:4px;}
.prog-fill{height:100%;border-radius:2px;background:var(--gr);}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.res-card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:14px;}
.res-ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.res-name{font-weight:600;font-size:13px;}
.rf{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.rf label{color:var(--tx3);font-size:11px;}
.rf input,.rf select{width:120px;background:var(--bg3);border:1px solid var(--b2);border-radius:4px;color:var(--tx);font-size:11px;padding:4px 7px;outline:none;font-family:var(--mono);}
.rf input:focus,.rf select:focus{border-color:var(--ac);}
.vac-tbl{width:100%;border-collapse:collapse;}
.vac-tbl th{padding:5px 8px;font-size:10px;color:var(--tx3);text-transform:uppercase;border-bottom:1px solid var(--b);text-align:left;}
.vac-tbl td{padding:4px 8px;border-bottom:1px solid var(--b);}
.vac-tbl input,.vac-tbl select{background:var(--bg3);border:1px solid var(--b2);border-radius:4px;color:var(--tx);font-size:11px;padding:3px 7px;outline:none;width:100%;}
.dl-list{display:flex;flex-direction:column;gap:8px;}
.dl-card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:14px;}
.dl-card.critical{border-color:#5a1020;}
.dl-card.high{border-color:#5a4010;}
.dl-ch{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.dl-name{font-weight:600;font-size:13px;flex:1;}
.dl-date{font-family:var(--mono);font-size:11px;color:var(--tx2);}
.hol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:6px;margin-bottom:16px;}
.hol-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:6px 10px;}
.hol-d{font-family:var(--mono);font-size:11px;color:var(--tx2);flex-shrink:0;}
.tt{position:fixed;background:var(--bg4);border:1px solid var(--b2);border-radius:var(--r);padding:10px 13px;font-size:11px;z-index:9999;pointer-events:none;max-width:280px;box-shadow:var(--sh);}
.tt-title{font-weight:600;font-size:12px;margin-bottom:7px;}
.tt-row{display:flex;justify-content:space-between;gap:16px;margin-bottom:3px;color:var(--tx2);}
.tt-row b{color:var(--tx);font-family:var(--mono);font-size:10px;}
.tt-sep{border:none;border-top:1px solid var(--b2);margin:6px 0;}
.onboard{display:flex;align-items:center;justify-content:center;height:100%;padding:20px;}
.onboard-card{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r2);padding:48px;width:min(580px,100%);text-align:center;box-shadow:var(--sh);}
.onboard-logo{font-size:36px;font-weight:700;letter-spacing:-1.5px;margin-bottom:6px;}
.onboard-sub{color:var(--tx2);font-size:14px;margin-bottom:32px;}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px;text-align:left;}
.feat{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--b);}
.feat-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.feat-text strong{display:block;font-size:12px;font-weight:600;color:var(--tx);margin-bottom:1px;}
.feat-text span{font-size:11px;color:var(--tx3);}
.ob-actions{display:flex;flex-direction:column;gap:8px;}
.ob-btn{padding:13px 20px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);transition:all .12s;}
.ob-pri{background:var(--ac2);color:#fff;}.ob-pri:hover{background:var(--ac);}
.ob-sec{background:var(--bg3);color:var(--tx2);border:1px solid var(--b2);}.ob-sec:hover{background:var(--bg4);color:var(--tx);}
.ob-div{display:flex;align-items:center;gap:12px;color:var(--tx3);font-size:11px;}
.ob-div::before,.ob-div::after{content:'';flex:1;height:1px;background:var(--b2);}
.divider{border:none;border-top:1px solid var(--b);margin:16px 0;}
.add-btn{background:transparent;border:1px dashed var(--b2);color:var(--tx3);padding:6px 12px;border-radius:var(--r);cursor:pointer;font-size:11px;font-family:var(--font);transition:all .12s;}
.add-btn:hover{border-color:var(--ac);color:var(--ac);}
.empty{text-align:center;padding:48px;color:var(--tx3);}
.empty p{margin-top:6px;font-size:11px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade{animation:fadeUp .15s ease forwards;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.saving{animation:pulse 1.2s ease infinite;}

/* ── Light mode ── */
@media(prefers-color-scheme:light){
  :root{
    --bg:#f8f9fc;--bg2:#ffffff;--bg3:#f0f2f5;--bg4:#e5e8ee;--bg5:#d8dce5;
    --b:#e0e4ea;--b2:#ccd2dc;--b3:#b0b8c8;
    --tx:#1a1e2a;--tx2:#4a5268;--tx3:#7a839a;
    --ac:#2563eb;--ac2:#1d4ed8;
    --gr:#16a34a;--am:#d97706;--re:#dc2626;--pu:#7c3aed;
    --sh:0 4px 24px rgba(0,0,0,.08);
  }
  body{-webkit-font-smoothing:auto;}
  .bd{background:#dcfce7;color:#15803d;border-color:#86efac;}
  .bw{background:#fef3c7;color:#a16207;border-color:#fcd34d;}
  .bo{background:#f0f2f5;color:#7a839a;border-color:#ccd2dc;}
  .bp1{background:#fee2e2;color:#b91c1c;border-color:#fca5a5;}
  .bp2{background:#fef3c7;color:#a16207;border-color:#fcd34d;}
  .bp3{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd;}
  .bp4{background:#f0f2f5;color:#7a839a;border-color:#ccd2dc;}
  .bc{background:#fee2e2;color:#b91c1c;border-color:#dc2626;}
  .bh{background:#fef3c7;color:#a16207;border-color:#d97706;}
  .b-cp{background:#fee2e2;color:#b91c1c;border-color:#991b1b;}
  .tr.l1 td{background:#f5f7fa;}
  .tr.l2 td{background:#fafbfd;}
  .tr:hover td{background:#e8ecf4!important;}
  .tr.sel td{background:#dbeafe!important;}
  .tr.cp-row td{border-left-color:#dc2626!important;}
  .overlay{background:rgba(0,0,0,.35);backdrop-filter:blur(4px);}
  .modal{box-shadow:0 8px 40px rgba(0,0,0,.15);}
  .gbar:hover{filter:brightness(.92);}
  .dl-bar{background:#fef2f2;border-color:#fca5a5;}
  .dl-bar.hi{background:#fffbeb;border-color:#fcd34d;}
  ::-webkit-scrollbar-track{background:#f0f2f5;}
  ::-webkit-scrollbar-thumb{background:#b0b8c8;}
}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useCallback,useRef,useEffect}=React;
const WPX=20,SK='planr_v2';
const MDE=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW_DE=['So','Mo','Di','Mi','Do','Fr','Sa'];
const PL={1:'Critical',2:'High',3:'Medium',4:'Low'};
const SL={done:'✓ Done',wip:'In Progress',open:'Open'};

const iso=d=>d.toISOString().split('T')[0];
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const monOf=d=>{const r=new Date(d),w=r.getDay();r.setDate(r.getDate()-(w===0?6:w-1));return r;};
const isoWeek=d=>{const j4=new Date(d.getFullYear(),0,4),sw=new Date(j4);sw.setDate(j4.getDate()-((j4.getDay()+6)%7));return Math.round((monOf(d)-sw)/(7*864e5))+1;};
const fmtDate=s=>{if(!s)return'—';return new Date(s).toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'});};
const diffDays=(a,b)=>Math.round((new Date(b)-new Date(a))/864e5);

function calcEaster(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
    f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
    h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
    l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
    mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;
  return new Date(y,mo-1,dy);
}
function computeNRW(years){
  const r=[];
  years.forEach(y=>{
    const e=calcEaster(y);
    const a=(d,n)=>r.push({date:iso(d),name:n,auto:true});
    a(new Date(y,0,1),'Neujahr');a(addD(e,-2),'Karfreitag');a(e,'Ostersonntag');
    a(addD(e,1),'Ostermontag');a(new Date(y,4,1),'Tag der Arbeit');
    a(addD(e,39),'Christi Himmelfahrt');a(addD(e,49),'Pfingstsonntag');
    a(addD(e,50),'Pfingstmontag');a(addD(e,60),'Fronleichnam');
    a(new Date(y,9,3),'Tag der Deutschen Einheit');a(new Date(y,10,1),'Allerheiligen');
    a(new Date(y,11,25),'1. Weihnachtstag');a(new Date(y,11,26),'2. Weihnachtstag');
  });
  return r;
}
const buildHMap=arr=>Object.fromEntries((arr||[]).map(h=>[h.date,h.name]));
function isWD(d,hm){return d.getDay()>0&&d.getDay()<6&&!hm[iso(d)];}
function buildWeeks(start,end,hm){
  const wks=[],ps=new Date(start),pe=new Date(end);let d=monOf(ps);
  while(d<=pe){
    const wds=[];for(let i=0;i<5;i++){const x=addD(d,i);if(x>=ps&&x<=pe&&isWD(x,hm))wds.push(new Date(x));}
    const hasH=Object.keys(hm).some(k=>{const hd=new Date(k);return hd>=d&&hd<addD(d,7)&&hd.getDay()>0&&hd.getDay()<6;});
    if(wds.length>0)wks.push({mon:new Date(d),wds,hasH,kw:isoWeek(d)});
    d=addD(d,7);
  }
  return wks;
}

// ── CPM ──────────────────────────────────────────────────────────────────────
function cpm(tree){
  const lv=Object.fromEntries(tree.filter(r=>r.lvl===3).map(r=>[r.id,r]));
  const eff=r=>r.status==='done'?0:Math.max((r.best||0)*Math.min(r.factor||1.5,1.3)*1.15,0.01);
  function resD(id){return lv[id]?[id]:Object.keys(lv).filter(k=>k.startsWith(id+'.'));}
  const rd=Object.fromEntries(Object.keys(lv).map(id=>[id,new Set((lv[id].deps||[]).flatMap(resD).filter(d=>lv[d]))]));
  const vis=new Set(),order=[];
  const visit=id=>{if(vis.has(id))return;vis.add(id);rd[id].forEach(d=>visit(d));order.push(id);};
  Object.keys(lv).sort().forEach(visit);
  const ef={};
  order.forEach(id=>{const df=rd[id].size?Math.max(...[...rd[id]].map(d=>ef[d]||0)):0;ef[id]=df+eff(lv[id]);});
  const pe=Math.max(0,...Object.values(ef));if(!pe)return{critical:new Set()};
  const ls={};
  [...order].reverse().forEach(id=>{
    const succs=Object.keys(lv).filter(s=>[...rd[s]].includes(id));
    const lf=succs.length?Math.min(...succs.map(s=>ls[s]||pe)):pe;
    ls[id]=lf-eff(lv[id]);
  });
  const critical=new Set(Object.keys(lv).filter(id=>Math.abs(ls[id]-(ef[id]-eff(lv[id])))<0.1));
  return{critical};
}

// ── Scheduler ────────────────────────────────────────────────────────────────
const pt=t=>{if(!t)return'';const m=t.match(/[A-Z][A-Z0-9]*/g);return m?m[0]:t;};
const re=( best,factor)=>best&&best>0?best*Math.min(factor||1.5,1.3)*1.15:0;

function schedule(tree,members,vacations,ps,pe,hm){
  const wks=buildWeeks(ps,pe,hm);
  if(!wks.length)return{results:[],weeks:[]};
  const iMap=Object.fromEntries(tree.map(r=>[r.id,r]));
  const lvs=tree.filter(r=>r.lvl===3);
  function resD(id){const it=iMap[id];if(!it)return[];if(it.lvl===3)return[id];return lvs.filter(l=>l.id.startsWith(id+'.')).map(l=>l.id);}
  const vis=new Set(),ord=[];
  const sv=[...lvs].sort((a,b)=>(a.prio||4)-(b.prio||4)||(a.seq||0)-(b.seq||0)||a.id.localeCompare(b.id));
  const visit=id=>{if(vis.has(id))return;vis.add(id);const r=iMap[id];if(r)(r.deps||[]).flatMap(resD).forEach(visit);ord.push(id);};
  sv.forEach(r=>visit(r.id));
  const pF=Object.fromEntries(members.map(m=>[m.id,0]));
  const tEW={};
  lvs.filter(r=>r.status==='done'||!r.best||r.best===0).forEach(r=>{tEW[r.id]=-1;});
  const vs={};(vacations||[]).forEach(v=>{if(!vs[v.person])vs[v.person]={};vs[v.person][v.week]=true;});
  function pC(m,wmon){
    if(vs[m.id]?.[iso(wmon)])return 0;
    const st=new Date(m.start||ps);if(st>addD(wmon,6))return 0;
    const w=wks.find(x=>x.mon.getTime()===wmon.getTime());
    if(!w)return 0;
    return w.wds.filter(d=>d>=st).length*(m.cap||1)*(1-(m.vac||25)/230);
  }
  const res=[];
  ord.forEach(id=>{
    if(tEW[id]!=null&&tEW[id]===-1)return;
    const r=iMap[id];
    if(!r||r.lvl!==3||!r.best||r.best===0){tEW[id]=-1;return;}
    const eff=re(r.best,r.factor);
    const team=pt(r.team);
    const tM=members.filter(m=>pt(m.team)===team);
    const allD=(r.deps||[]).flatMap(resD);
    let dE=-1;allD.forEach(d=>{const fw=tEW[d];if(fw!=null&&fw>dE)dE=fw;});
    const early=dE>=0?dE+2:0;
    const asgn=(r.assign||[]).filter(a=>members.find(m=>m.id===a));
    const cands=asgn.length>0?members.filter(m=>asgn.includes(m.id)):(tM.length>0?tM:members);
    let bp=null,bs=9999;
    cands.forEach(m=>{const ji=wks.findIndex(w=>w.mon>=new Date(m.start||ps));const fw=Math.max(pF[m.id]||0,early,ji>=0?ji:0);if(fw<bs){bs=fw;bp=m;}});
    if(!bp||bs>=wks.length){tEW[id]=Math.min(early,wks.length-1);return;}
    let rem=eff,wi=bs;
    while(rem>0&&wi<wks.length){rem-=Math.max(pC(bp,wks[wi].mon),0.01);wi++;}
    const eW=Math.min(wi-1,wks.length-1);
    tEW[id]=eW;pF[bp.id]=eW+1;
    res.push({id:r.id,name:r.name,team,person:bp.id,prio:r.prio,seq:r.seq,
      best:r.best,effort:eff,startWi:bs,endWi:eW,
      startD:wks[bs].mon,endD:addD(wks[eW].mon,4),
      deps:(r.deps||[]).join(', '),status:r.status,note:r.note||''});
  });
  return{results:res,weeks:wks};
}

function treeStats(tree){
  const m=Object.fromEntries(tree.map(r=>[r.id,{...r}]));
  [...tree].reverse().forEach(r=>{
    if(r.lvl===3){m[r.id]._b=r.best||0;m[r.id]._r=re(r.best||0,r.factor||1.5);m[r.id]._w=(r.best||0)*(r.factor||1.5);}
    else{const ch=tree.filter(c=>c.id!==r.id&&c.id.startsWith(r.id+'.')&&c.id.split('.').length===r.id.split('.').length+1);
      m[r.id]._b=ch.reduce((s,c)=>s+(m[c.id]?._b||0),0);
      m[r.id]._r=ch.reduce((s,c)=>s+(m[c.id]?._r||0),0);
      m[r.id]._w=ch.reduce((s,c)=>s+(m[c.id]?._w||0),0);}
  });
  return m;
}

function nextChildId(tree,parentId){
  if(!parentId){
    const nums=tree.filter(r=>r.lvl===1).map(r=>parseInt(r.id.replace(/^P/,''))||0);
    return `P${(nums.length?Math.max(...nums):0)+1}`;
  }
  const depth=parentId.split('.').length;
  const siblings=tree.filter(r=>r.id.startsWith(parentId+'.')&&r.id.split('.').length===depth+1);
  const nums=siblings.map(r=>parseInt(r.id.split('.').pop())||0);
  return `${parentId}.${(nums.length?Math.max(...nums):0)+1}`;
}

            {(dl.linkedItems||[]).map(id=><span key={id} className="tag">{id}<span className="tag-x" onClick={()=>upd(i,'linkedItems',(dl.linkedItems||[]).filter(v=>v!==id))}>×</span></span>)}
          </div>
          <select onChange={e=>{if(!e.target.value)return;const c=dl.linkedItems||[];if(!c.includes(e.target.value))upd(i,'linkedItems',[...c,e.target.value]);e.target.value=''}}>
            <option value="">+ Link item</option>{allIds.map(id=><option key={id}>{id}</option>)}
          </select>
        </div>
        <button className="btn btn-danger btn-xs" onClick={()=>setItems(its=>its.filter((_,j)=>j!==i))}>Remove</button>
      </div>)}
      <button className="add-btn" style={{width:'100%',marginBottom:14}} onClick={()=>setItems(its=>[...its,{id:`dl${Date.now()}`,name:'',date:'',description:'',severity:'high',linkedItems:[]}])}>+ Add deadline</button>
      <div className="modal-footer">
        <button className="btn btn-sec" onClick={onClose}>Cancel</button>
        <button className="btn btn-pri" onClick={()=>{onSave(items);onClose();}}>Save</button>

    </div>
  </div>;
}

// ── Tree View ─────────────────────────────────────────────────────────────────
function TreeView({tree,selected,onSelect,onDbl,search,stats,teams,cpSet,onQuickAdd}){
  const filt=useMemo(()=>{
    if(!search)return tree;const q=search.toLowerCase();
    return tree.filter(r=>r.id.toLowerCase().includes(q)||r.name.toLowerCase().includes(q)||(r.note||'').toLowerCase().includes(q));
  },[tree,search]);
  return<table className="tree-tbl">
    <thead><tr>
      <th style={{width:110}}>ID</th><th>Name</th>
      <th style={{width:30}}></th>
      <th style={{width:80}}>Status</th><th style={{width:80}}>Team</th>
      <th className="r" style={{width:60}}>Best</th><th className="r" style={{width:65}}>Realistic</th><th className="r" style={{width:60}}>Worst</th>
      <th style={{width:80}}>Priority</th><th style={{width:35}}>Seq</th>
    </tr></thead>
    <tbody>
      {filt.map(r=>{
        const s=stats[r.id]||r;const isCp=r.lvl===3&&cpSet?.has(r.id);const canAdd=r.lvl<3;
        return<tr key={r.id} className={`tr l${r.lvl}${selected?.id===r.id?' sel':''}${isCp?' cp-row':''}`}
          onClick={()=>onSelect(r)} onDoubleClick={()=>onDbl(r)}>
          <td><span className="tid">{r.id}</span></td>
          <td>
            <span style={{display:'inline-block',width:(r.lvl-1)*16}}/>
            <span className={`tn l${r.lvl}`}>{r.name}</span>
            {isCp&&<span style={{fontSize:9,color:'var(--re)',marginLeft:5}}>⚡</span>}
            {r.note&&<span className="note-inline">{r.note}</span>}
          </td>
          <td>{canAdd&&<button className="btn btn-ghost btn-xs" style={{opacity:.4,fontSize:13,padding:'1px 4px'}}
            title={`Add ${r.lvl===1?'group':'task'} under ${r.id}`}
            onClick={e=>{e.stopPropagation();onQuickAdd(r);}}>+</button>}</td>
          <td><SBadge s={r.status}/></td><td><TBadge t={r.team} teams={teams}/></td>
          <td className="nc">{s._b>0?s._b:''}</td>

          <td className="nc">{s._w>0?s._w.toFixed(0):''}</td>
          <td>{r.lvl===3&&<PBadge p={r.prio}/>}</td>
          <td className="nc">{r.lvl===3?r.seq:''}</td>
        </tr>;
      })}

}

// ── Gantt View with Drag & Drop + Critical Path Lines ────────────────────────
function GanttView({scheduled,weeks,deadlines,teams,cpSet,tree,onBarClick,onSeqUpdate}){
  const[tip,setTip]=useState(null);
  const[drag,setDrag]=useState(null);
  const[dDelta,setDDelta]=useState(0);
  const hR=useRef(null),bR=useRef(null),lR=useRef(null);

  function syncS(e){if(hR.current)hR.current.scrollLeft=e.target.scrollLeft;if(lR.current)lR.current.scrollTop=e.target.scrollTop;}
  function syncL(e){if(bR.current)bR.current.scrollTop=e.target.scrollTop;}

  const tw=weeks.length*WPX;
  const months=[];let cm=null,cc=0,cs=0;
  weeks.forEach((w,i)=>{const ym=`${w.mon.getFullYear()}-${w.mon.getMonth()}`;
    if(ym!==cm){if(cm)months.push({ym:cm,count:cc,start:cs});cm=ym;cc=1;cs=i;}else cc++;});
  if(cm)months.push({ym:cm,count:cc,start:cs});

  const usedT=[...new Set(scheduled.map(s=>s.team))].filter(Boolean);
  const tOrd=[...new Set([...teams.map(t=>t.id),...usedT])].filter(t=>usedT.includes(t));
  const grp={};tOrd.forEach(t=>{grp[t]=scheduled.filter(s=>s.team===t).sort((a,b)=>(a.prio||4)-(b.prio||4)||(a.seq||0)-(b.seq||0)||a.id.localeCompare(b.id));});

  const rows=[];tOrd.forEach(t=>{const tasks=grp[t]||[];if(!tasks.length)return;rows.push({type:'team',team:t});tasks.forEach(s=>rows.push({type:'task',s,team:t}));});
  const RH=28,HH=28;
  const dlL=(deadlines||[]).filter(d=>d.date).map(dl=>{const di=weeks.findIndex(w=>w.mon>new Date(dl.date));return{...dl,wi:di>=0?di:weeks.length};});
  const gTC=t=>teams.find(x=>x.id===t)?.color||'#3b82f6';

  // Build row index map and CP dependency lines
  const rowIdx={};rows.forEach((r,i)=>{if(r.type==='task')rowIdx[r.s.id]=i;});
  const iMap=Object.fromEntries((tree||[]).map(r=>[r.id,r]));
  const sMap=Object.fromEntries(scheduled.map(s=>[s.id,s]));
  function resD(id){return iMap[id]?.lvl===3?[id]:(tree||[]).filter(l=>l.lvl===3&&l.id.startsWith(id+'.')).map(l=>l.id);}
  const cpLines=useMemo(()=>{
    if(!cpSet?.size||!tree)return[];
    const lines=[];
    scheduled.forEach(s=>{
      if(!cpSet.has(s.id))return;
      const node=iMap[s.id];if(!node)return;
      (node.deps||[]).flatMap(resD).forEach(depId=>{
        if(!cpSet.has(depId))return;
        const dep=sMap[depId];if(!dep)return;
        const srcRow=rowIdx[depId],tgtRow=rowIdx[s.id];
        if(srcRow==null||tgtRow==null)return;
        lines.push({fromId:depId,toId:s.id,x1:(dep.endWi+1)*WPX,y1:srcRow*RH+RH/2,x2:s.startWi*WPX,y2:tgtRow*RH+RH/2});
      });
    });
    return lines;
  },[scheduled,cpSet,tree,rowIdx]);

  function onBMD(e,s){e.stopPropagation();setDrag({id:s.id,startWi:s.startWi,endWi:s.endWi,ox:e.clientX,seq:s.seq,team:s.team,prio:s.prio});setDDelta(0);}
  function onMM(e){if(!drag)return;const dx=e.clientX-drag.ox;setDDelta(Math.round(dx/WPX));}
  function onMU(){
    if(!drag){return;}
    if(dDelta!==0){const ns=Math.max(0,(drag.startWi+dDelta)*2);onSeqUpdate(drag.id,ns);}
    setDrag(null);setDDelta(0);
  }

  if(!scheduled.length)return<div className="pane" style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style={{textAlign:'center',color:'var(--tx3)'}}><div style={{fontSize:32,marginBottom:12}}>📅</div>
      <div style={{fontSize:14,fontWeight:500,color:'var(--tx2)',marginBottom:8}}>No scheduled items</div>
      <div style={{fontSize:12}}>Add tasks with estimates to see the Gantt chart.</div>
    </div>
  </div>;

  return<div className="gantt" onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={()=>{if(drag){setDrag(null);setDDelta(0);}}}>
    <div className="gantt-hdr">
      <div className="gh-fix"><span style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--tx3)'}}>Item / Person</span></div>
      <div ref={hR} className="gh-scroll">
        <div style={{display:'flex',borderBottom:'1px solid var(--b)',height:HH/2}}>
          {months.map((m,i)=>{const[y,mo]=m.ym.split('-');const isYS=mo==='0';
            return<div key={i} style={{width:WPX*m.count,flexShrink:0,borderRight:'1px solid var(--b)',padding:'2px 5px',fontSize:9,color:isYS?'var(--ac)':'var(--tx3)',fontFamily:'var(--mono)',fontWeight:isYS?600:400,overflow:'hidden',background:isYS?'var(--bg3)':'',display:'flex',alignItems:'center'}}>
              {isYS&&`${y} `}{MDE[+mo]}
            </div>;})}
        </div>
        <div style={{display:'flex',height:HH/2}}>
          {weeks.map((w,i)=>{const isYB=i>0&&weeks[i-1].mon.getFullYear()!==w.mon.getFullYear();
            return<div key={i} style={{width:WPX,flexShrink:0,borderRight:'1px solid var(--b2)',borderLeft:isYB?'2px solid var(--ac2)':'',textAlign:'center',fontSize:8,color:w.hasH?'var(--re)':'var(--tx3)',fontFamily:'var(--mono)',background:w.hasH?'rgba(244,63,94,.06)':isYB?'rgba(37,99,235,.06)':''}}>
              {w.kw}
            </div>;})}
        </div>
      </div>
    </div>
    <div className="gantt-body">
      <div ref={lR} className="gantt-left" style={{overflowY:'hidden'}} onScroll={syncL}>
        {rows.map((row,ri)=>{
          if(row.type==='team'){const tc=gTC(row.team);
            return<div key={'h'+row.team} className="gteam" style={{color:tc,borderLeft:`3px solid ${tc}`,background:tc+'11',paddingLeft:10,height:RH}}>
              {teams.find(t=>t.id===row.team)?.name||row.team}
            </div>;}
          const s=row.s;const tc=gTC(row.team);const isCp=cpSet?.has(s.id);
          return<div key={s.id} className={`grow-l${isCp?' cp-row':''}`} style={{height:RH,cursor:'pointer'}}
            onClick={()=>onBarClick(s)}
            onMouseMove={e=>setTip({item:{...s,isCp},x:e.clientX,y:e.clientY})}
            onMouseLeave={()=>setTip(null)}>
            <span className="tid" style={{flexShrink:0}}>{s.id}</span>
            <span style={{background:tc+'22',color:tc,fontSize:9,padding:'1px 5px',borderRadius:3,flexShrink:0,fontFamily:'var(--mono)'}}>{s.person}</span>
            <span style={{fontSize:11,color:'var(--tx2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</span>
            {isCp&&<span style={{fontSize:9,color:'var(--re)',flexShrink:0}}>⚡</span>}
          </div>;
        })}
      </div>
      <div ref={bR} style={{flex:1,overflow:'auto'}} onScroll={syncS}>
        <div style={{width:tw,position:'relative'}}>
          {/* Grid background */}
          <div style={{position:'absolute',top:0,left:0,width:tw,height:rows.length*RH,pointerEvents:'none',zIndex:0}}>
            {weeks.map((w,i)=><div key={i} style={{position:'absolute',left:i*WPX,top:0,width:WPX,height:'100%',borderRight:'1px solid var(--b)',background:w.hasH?'rgba(244,63,94,.06)':''}}/>)}
            {dlL.map(dl=><div key={dl.id} style={{position:'absolute',left:dl.wi*WPX,top:0,width:2,height:'100%',background:dl.severity==='critical'?'var(--re)':'var(--am)',opacity:.5,zIndex:4}} title={dl.name}/>)}
          </div>
          {/* Task bars */}
          {rows.map((row,ri)=>{
            if(row.type==='team'){const tc=gTC(row.team);return<div key={'h'+row.team} style={{height:RH,background:tc+'08',borderBottom:'1px solid var(--b2)',position:'sticky',top:0,zIndex:2}}/>;}
            const s=row.s;const tc=gTC(row.team);const isCp=cpSet?.has(s.id);
            const isDrag=drag?.id===s.id;
            const wiS=isDrag?Math.max(0,s.startWi+dDelta):s.startWi;
            const wiE=isDrag?Math.max(wiS,s.endWi+dDelta):s.endWi;
            const bW=(wiE-wiS+1)*WPX-4;
            return<div key={s.id} style={{height:RH,position:'relative',borderBottom:'1px solid var(--b)'}}
              onMouseMove={e=>!drag&&setTip({item:{...s,isCp},x:e.clientX,y:e.clientY})}
              onMouseLeave={()=>setTip(null)}>
              {s.status!=='done'&&bW>0&&<div className={`gbar${isDrag?' dragging':''}${isCp?' cp-bar':''}`}
                style={{left:wiS*WPX+2,width:Math.max(bW,6),background:tc+(isCp?'40':'28'),color:tc,borderLeft:`2px solid ${tc}`,cursor:drag?'grabbing':'grab'}}
                onMouseDown={e=>onBMD(e,s)}
                onClick={()=>{if(Math.abs(dDelta)===0)onBarClick(s);}}>
                {bW>35&&s.name}
              </div>}
            </div>;
          })}
          {/* Critical path dependency arrows */}
          {cpLines.length>0&&<svg style={{position:'absolute',top:0,left:0,width:tw,height:rows.length*RH,pointerEvents:'none',zIndex:3}}>
            <defs><marker id="gar" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="6" markerHeight="5" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--re)"/></marker></defs>
            {cpLines.map((l,i)=>{
              const mx=(l.x1+l.x2)/2;
              return<path key={i} d={`M${l.x1},${l.y1} C${mx},${l.y1} ${mx},${l.y2} ${l.x2},${l.y2}`}
                fill="none" stroke="var(--re)" strokeWidth={1.5} opacity={.6} markerEnd="url(#gar)"/>;
            })}
          </svg>}
        </div>
      </div>
    </div>
    <div className="gantt-footer">
      {dlL.map(dl=><span key={dl.id} className={`badge b${dl.severity==='critical'?'c':'h'}`}>⚑ {dl.name} {dl.date}</span>)}
      {cpSet?.size>0&&<span className="badge b-cp">⚡ Critical path: {cpSet.size} items · {cpLines.length} deps</span>}
      <span style={{fontSize:11,color:'var(--tx3)',marginLeft:'auto'}}>Drag bars to reorder · Click for details</span>
    </div>
    {tip&&!drag&&<Tip item={tip.item} x={tip.x} y={tip.y}/>}
  </div>;
}

// ── Network Graph (Sugiyama layout with crossing minimization) ───────────────
function NetGraph({tree,scheduled,teams,cpSet,onNodeClick,onQuickAdd}){
  const[pan,setPan]=useState({x:40,y:40});
  const[zoom,setZoom]=useState(1);
  const[panning,setPanning]=useState(false);
  const[panSt,setPanSt]=useState(null);
  const[tip,setTip]=useState(null);

  const lvs=tree.filter(r=>r.lvl===3&&r.best>0);
  const iMap=Object.fromEntries(tree.map(r=>[r.id,r]));
  const sMap=Object.fromEntries(scheduled.map(s=>[s.id,s]));
  function resD(id){return iMap[id]?.lvl===3?[id]:lvs.filter(l=>l.id.startsWith(id+'.')).map(l=>l.id);}

  // Build edges & in-degrees
  const edges=[];const inDeg=Object.fromEntries(lvs.map(r=>[r.id,0]));
  lvs.forEach(r=>{(r.deps||[]).flatMap(resD).forEach(d=>{if(iMap[d]){edges.push({from:d,to:r.id});inDeg[r.id]=(inDeg[r.id]||0)+1;}});});

  // Layer assignment (topological BFS)
  const layers={};const asgn=new Set();let layer=0;
  let frontier=lvs.filter(r=>!inDeg[r.id]).map(r=>r.id);
  while(frontier.length&&layer<60){
    frontier.forEach(id=>{layers[id]=layer;asgn.add(id);});
    const next=new Set();
    frontier.forEach(id=>{lvs.filter(r=>(r.deps||[]).flatMap(resD).includes(id)).forEach(r=>{if(!asgn.has(r.id))next.add(r.id);});});
    frontier=[...next].filter(id=>{const r=lvs.find(x=>x.id===id);return r&&(r.deps||[]).flatMap(resD).every(d=>asgn.has(d));});
    layer++;
  }
  lvs.forEach(r=>{if(layers[r.id]==null)layers[r.id]=0;});

  // Group by layer
  const byL={};lvs.forEach(r=>{const l=layers[r.id]||0;if(!byL[l])byL[l]=[];byL[l].push(r);});
  const maxLay=Math.max(0,...Object.keys(byL).map(Number));

  // Initial sort: by team then by id for grouping
  Object.values(byL).forEach(ns=>ns.sort((a,b)=>(pt(a.team)||'').localeCompare(pt(b.team)||'')||a.id.localeCompare(b.id)));

  // Barycenter crossing minimization (4 forward+backward passes)
  for(let iter=0;iter<4;iter++){
    // Forward pass: order by avg position of predecessors
    for(let l=1;l<=maxLay;l++){
      if(!byL[l])continue;
      byL[l].forEach(r=>{
        const preds=edges.filter(e=>e.to===r.id&&layers[e.from]===l-1).map(e=>byL[l-1]?.findIndex(n=>n.id===e.from)).filter(i=>i>=0);
        r._bc=preds.length?preds.reduce((s,i)=>s+i,0)/preds.length:byL[l].indexOf(r);
      });
      byL[l].sort((a,b)=>(a._bc??0)-(b._bc??0));
    }
    // Backward pass: order by avg position of successors
    for(let l=maxLay-1;l>=0;l--){
      if(!byL[l])continue;
      byL[l].forEach(r=>{
        const succs=edges.filter(e=>e.from===r.id&&layers[e.to]===l+1).map(e=>byL[l+1]?.findIndex(n=>n.id===e.to)).filter(i=>i>=0);
        r._bc=succs.length?succs.reduce((s,i)=>s+i,0)/succs.length:byL[l].indexOf(r);
      });
      byL[l].sort((a,b)=>(a._bc??0)-(b._bc??0));
    }
  }

  // Position: center layers vertically
  const NW=150,NH=50,HG=100,VG=20;
  const maxInLayer=Math.max(1,...Object.values(byL).map(n=>n.length));
  const totalMaxH=maxInLayer*(NH+VG)-VG;
  const pos={};
  Object.entries(byL).forEach(([l,nodes])=>{
    const x=+l*(NW+HG);
    const layH=nodes.length*(NH+VG)-VG;
    const offY=(totalMaxH-layH)/2;
    nodes.forEach((r,i)=>{pos[r.id]={x,y:offY+i*(NH+VG)};});
  });

  // Auto-fit on first render
  const fitRef=useRef(false);
  useEffect(()=>{
    if(fitRef.current||!lvs.length)return;fitRef.current=true;
    const totalW=(maxLay+1)*(NW+HG);const totalH=totalMaxH+NH;
    const vw=window.innerWidth-360,vh=window.innerHeight-200;
    const s=Math.min(vw/totalW,vh/totalH,1.2);
    setZoom(Math.max(.3,s));setPan({x:30,y:30});
  },[lvs.length]);

  function onW(e){e.preventDefault();const f=e.deltaY>0?.9:1.1;setZoom(z=>Math.min(3,Math.max(.2,z*f)));}
  function onMD(e){if(e.button===0){setPanning(true);setPanSt({x:e.clientX-pan.x,y:e.clientY-pan.y});}}
  function onMM(e){if(panning&&panSt)setPan({x:e.clientX-panSt.x,y:e.clientY-panSt.y});}
  function onMU(){setPanning(false);setPanSt(null);}

  const gTC=t=>teams.find(x=>x.id===pt(t))?.color||'#3b82f6';
  const SC={done:'#22c55e',wip:'#f59e0b',open:'#4f8ef7'};

  // Detect team clusters for background rectangles
  const teamClusters=useMemo(()=>{
    const byTeam={};lvs.forEach(r=>{const t=pt(r.team)||'?';if(!byTeam[t])byTeam[t]=[];byTeam[t].push(r);});
    return Object.entries(byTeam).map(([t,nodes])=>{
      const xs=nodes.map(r=>pos[r.id]?.x??0),ys=nodes.map(r=>pos[r.id]?.y??0);
      return{team:t,x:Math.min(...xs)-10,y:Math.min(...ys)-10,w:Math.max(...xs)-Math.min(...xs)+NW+20,h:Math.max(...ys)-Math.min(...ys)+NH+20,color:gTC(t)};
    });
  },[lvs,pos]);

  if(!lvs.length)return<div className="pane" style={{display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
    <div style={{textAlign:'center',color:'var(--tx3)'}}><div style={{fontSize:32,marginBottom:12}}>🕸</div>
      <div style={{fontSize:14,fontWeight:500,color:'var(--tx2)',marginBottom:8}}>No items with estimates</div>
      <div style={{fontSize:12}}>Add tasks with time estimates to see the dependency graph.</div>
    </div>
  </div>;

  return<div className="netgraph-wrap" onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU} onWheel={onW} style={{cursor:panning?'grabbing':'grab'}}>
    <div className="ng-toolbar">
      <button className="btn btn-sec btn-sm" onClick={()=>{fitRef.current=false;const totalW=(maxLay+1)*(NW+HG);const totalH=totalMaxH+NH;const vw=window.innerWidth-360,vh=window.innerHeight-200;const s=Math.min(vw/totalW,vh/totalH,1.2);setZoom(Math.max(.3,s));setPan({x:30,y:30});}}>Fit</button>
      <button className="btn btn-sec btn-sm" onClick={()=>setZoom(z=>Math.min(3,z*1.2))}>+</button>
      <button className="btn btn-sec btn-sm" onClick={()=>setZoom(z=>Math.max(.2,z*.8))}>−</button>
    </div>
    <svg style={{width:'100%',height:'100%'}}>
      <defs>
        <marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="var(--b3)"/></marker>
        <marker id="ar-cp" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="var(--re)"/></marker>
      </defs>
      <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>
        {/* Team cluster backgrounds */}
        {teamClusters.filter(c=>c.w>0).map(c=><rect key={c.team} x={c.x} y={c.y} width={c.w} height={c.h} rx={12} fill={c.color+'08'} stroke={c.color+'20'} strokeWidth={1} strokeDasharray="6 3"/>)}
        {teamClusters.filter(c=>c.w>0).map(c=><text key={'t'+c.team} x={c.x+6} y={c.y-4} fontSize={10} fill={c.color+'80'} fontFamily="var(--mono)" fontWeight={600}>{teams.find(x=>x.id===c.team)?.name||c.team}</text>)}
        {/* Edges with smooth curves */}
        {edges.map((e,i)=>{
          const fp=pos[e.from],tp=pos[e.to];if(!fp||!tp)return null;
          const isCp=cpSet?.has(e.from)&&cpSet?.has(e.to);
          const x1=fp.x+NW,y1=fp.y+NH/2,x2=tp.x,y2=tp.y+NH/2;
          const dx=x2-x1;const cx1=x1+dx*.4,cx2=x2-dx*.4;
          return<path key={i} d={`M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`}
            fill="none" stroke={isCp?'var(--re)':'var(--b3)'} strokeWidth={isCp?2.5:1.2} opacity={isCp?1:.45} markerEnd={isCp?'url(#ar-cp)':'url(#ar)'}/>;
        })}
        {/* Nodes */}
        {lvs.map(r=>{
          const p=pos[r.id];if(!p)return null;
          const isCp=cpSet?.has(r.id);const sc=sMap[r.id];const tc=gTC(r.team);const stC=SC[r.status]||'#4f8ef7';
          return<g key={r.id} transform={`translate(${p.x},${p.y})`} style={{cursor:'pointer'}}
            onClick={e=>{e.stopPropagation();onNodeClick(r);}}
            onMouseEnter={e=>setTip({item:{...r,...(sc||{})},x:e.clientX,y:e.clientY})}
            onMouseLeave={()=>setTip(null)}>
            <rect width={NW} height={NH} rx={7} fill={tc+'18'} stroke={isCp?'var(--re)':tc+'55'} strokeWidth={isCp?2.5:1}/>
            <rect x={0} y={0} width={4} height={NH} rx={3} fill={stC}/>
            <text x={12} y={15} fontSize={9} fill="var(--tx3)" fontFamily="var(--mono)">{r.id}</text>
            <text x={12} y={30} fontSize={10.5} fill={tc} fontWeight={600}>{r.name.length>16?r.name.slice(0,15)+'…':r.name}</text>
            {sc&&<text x={12} y={43} fontSize={8.5} fill="var(--tx3)" fontFamily="var(--mono)">{sc.effort?.toFixed(0)}d · {sc.person}</text>}
            {isCp&&<text x={NW-14} y={14} fontSize={11} fill="var(--re)">⚡</text>}
          </g>;
        })}
      </g>
    </svg>
    <div className="ng-legend">
      {[['done','#22c55e'],['wip','#f59e0b'],['open','#4f8ef7']].map(([s,c])=><div key={s} className="ng-li"><div className="ng-dot" style={{background:c}}/><span>{SL[s]}</span></div>)}
      <div className="ng-li" style={{color:'var(--re)'}}>⚡ Critical path</div>
      <span style={{color:'var(--tx3)',fontSize:10}}>Scroll=zoom · Drag=pan · Click=details</span>
    </div>
    {tip&&<Tip item={tip.item} x={tip.x} y={tip.y}/>}
  </div>;
}

// ── Holidays View ─────────────────────────────────────────────────────────────
function HolView({holidays,planStart,planEnd,onUpdate}){
  const planYears=[];for(let y=new Date(planStart).getFullYear();y<=new Date(planEnd).getFullYear();y++)planYears.push(y);
  const sorted=[...(holidays||[])].sort((a,b)=>a.date.localeCompare(b.date));
  const byY={};sorted.forEach(h=>{const y=h.date.split('-')[0];if(!byY[y])byY[y]=[];byY[y].push(h);});
  function importNRW(){
    const nrw=computeNRW(planYears);const ex=new Set((holidays||[]).map(h=>h.date));
    onUpdate([...(holidays||[]),...nrw.filter(h=>!ex.has(h.date))].sort((a,b)=>a.date.localeCompare(b.date)));
  }
  function upd(idx,k,v){onUpdate((holidays||[]).map((h,i)=>i===idx?{...h,[k]:v,auto:false}:h));}
  function del(idx){onUpdate((holidays||[]).filter((_,i)=>i!==idx));}
  const aC=(holidays||[]).filter(h=>h.auto).length;
  const mC=(holidays||[]).filter(h=>!h.auto).length;
  return<div>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
      <div className="section-h" style={{margin:0}}>Holidays</div>
      <button className="btn btn-pri btn-sm" onClick={importNRW}>↓ Import NRW ({planYears.join(', ')})</button>
      <button className="btn btn-sec btn-sm" onClick={()=>onUpdate([...(holidays||[]),{date:iso(new Date()),name:'',auto:false}])}>+ Add manually</button>
      {(holidays||[]).length>0&&<button className="btn btn-danger btn-sm" onClick={()=>{if(confirm('Delete all holidays?'))onUpdate([]);}}>Clear all</button>}
      <div style={{flex:1}}/>
      <span style={{fontSize:11,color:'var(--tx3)'}}>{aC} computed · {mC} manual</span>
    </div>
    <p style={{fontSize:12,color:'var(--tx3)',marginBottom:14}}>Holidays are excluded from working day calculations. NRW holidays are computed dynamically via Easter algorithm and stored in the project file.</p>
    {!(holidays||[]).length&&<div className="empty"><div style={{fontSize:28,marginBottom:10}}>📆</div>
      <div style={{fontWeight:500,color:'var(--tx2)',marginBottom:8}}>No holidays configured</div>
      <button className="btn btn-pri" onClick={importNRW}>↓ Import NRW holidays</button>
    </div>}
    {Object.keys(byY).sort().map(y=><div key={y} style={{marginBottom:18}}>
      <div className="section-h">{y} — {byY[y].length} holidays</div>
      <div className="hol-grid">
        {byY[y].map(h=>{const gi=(holidays||[]).indexOf(h);const dt=new Date(h.date),dow=DOW_DE[dt.getDay()];
          return<div key={h.date+gi} className="hol-row">
            {h.auto
              ?<><span className="hol-d">{dow} {h.date}</span><span style={{flex:1,fontSize:12}}>{h.name}</span><span className="badge bo" style={{fontSize:9}}>NRW</span><button className="btn btn-ghost btn-xs" onClick={()=>del(gi)}>×</button></>
              :<><input type="date" value={h.date} onChange={e=>upd(gi,'date',e.target.value)} style={{background:'var(--bg3)',border:'1px solid var(--b2)',borderRadius:4,color:'var(--tx)',fontSize:11,padding:'3px 6px',fontFamily:'var(--mono)',width:128,outline:'none'}}/><input value={h.name} onChange={e=>upd(gi,'name',e.target.value)} style={{flex:1,background:'var(--bg3)',border:'1px solid var(--b2)',borderRadius:4,color:'var(--tx)',fontSize:11,padding:'3px 6px',outline:'none',marginLeft:6}} placeholder="Name"/><span className="badge bw" style={{fontSize:9,marginLeft:4}}>manual</span><button className="btn btn-danger btn-xs" onClick={()=>del(gi)}>×</button></>
            }
          </div>;
        })}
      </div>
    </div>)}
  </div>;
}

// ── Deadlines View ────────────────────────────────────────────────────────────
function DLView({deadlines,scheduled,onEdit}){
  return<div>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
      <div className="section-h" style={{margin:0}}>Deadlines</div>

    <div className="dl-list">
      {deadlines.map(dl=>{
        const linked=scheduled.filter(s=>(dl.linkedItems||[]).includes(s.id));
        const maxEnd=linked.length>0?linked.reduce((m,s)=>s.endD>m?s.endD:m,new Date(0)):null;
        const dlDate=dl.date?new Date(dl.date):null;
        const isLate=maxEnd&&dlDate&&maxEnd>dlDate;
        const daysLeft=dlDate?diffDays(new Date(),dlDate):null;
        return<div key={dl.id} className={`dl-card ${dl.severity}`}>

            <span className={`badge b${dl.severity==='critical'?'c':'h'}`}>⚑ {dl.severity}</span>
            <span className="dl-name">{dl.name}</span>
            <span className="dl-date">{fmtDate(dl.date)}</span>
            {daysLeft!=null&&daysLeft>=0&&<span className="badge bo">{daysLeft}d left</span>}
            {isLate&&<span className="badge bc">⚠ {Math.round((maxEnd-dlDate)/864e5)}d late</span>}
            {!isLate&&maxEnd&&<span className="badge bd">✓ On track</span>}
          </div>
          {dl.description&&<div style={{fontSize:11,color:'var(--tx3)'}}>{dl.description}</div>}
          {linked.length>0&&<div style={{marginTop:8,display:'flex',gap:4,flexWrap:'wrap'}}>
            {linked.map(s=><span key={s.id} className="tag">{s.id} — ends {iso(s.endD)}</span>)}
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

// ── Summary View ──────────────────────────────────────────────────────────────
function SumView({tree,scheduled,deadlines,members,teams,cpSet}){
  const stats=treeStats(tree);
  const lvs=tree.filter(r=>r.lvl===3);
  const done=lvs.filter(r=>r.status==='done').length;
  const wip=lvs.filter(r=>r.status==='wip').length;
  const open=lvs.filter(r=>r.status==='open').length;
  const tB=lvs.reduce((s,r)=>s+(r.best||0),0);
  const tR=lvs.reduce((s,r)=>s+re(r.best||0,r.factor||1.5),0);
  const prog=lvs.length>0?(done/lvs.length)*100:0;
  const latE=scheduled.length>0?scheduled.reduce((m,s)=>s.endD>m?s.endD:m,new Date(0)):null;
  const byT={};scheduled.forEach(s=>{if(!byT[s.team])byT[s.team]={t:0,pt:0};byT[s.team].t++;byT[s.team].pt+=s.effort;});
  return<div>
    <div className="sum-row">
      <div className="sum-card"><div className="sum-v">{lvs.length}</div><div className="sum-l">Total tasks</div></div>
      <div className="sum-card"><div className="sum-v" style={{color:'var(--gr)'}}>{done}</div><div className="sum-l">Done</div></div>
      <div className="sum-card"><div className="sum-v" style={{color:'var(--am)'}}>{wip}</div><div className="sum-l">In progress</div></div>
      <div className="sum-card"><div className="sum-v" style={{color:'var(--tx3)'}}>{open}</div><div className="sum-l">Open</div></div>
      <div className="sum-card"><div className="sum-v">{tB}</div><div className="sum-l">Best case PT</div></div>
      <div className="sum-card"><div className="sum-v" style={{color:'var(--gr)'}}>{tR.toFixed(0)}</div><div className="sum-l">Realistic PT</div></div>
      <div className="sum-card"><div className="sum-v">{members.length}</div><div className="sum-l">People</div></div>
      {latE&&new Date(latE).getFullYear()>2000&&<div className="sum-card"><div className="sum-v" style={{fontSize:14}}>{iso(latE)}</div><div className="sum-l">Projected end</div></div>}
    </div>
    {cpSet?.size>0&&<div style={{background:'#3d0a0e',border:'1px solid #7f1d1d',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
      <span style={{fontSize:16}}>⚡</span>
      <div><div style={{fontWeight:600,fontSize:12,color:'#fda4af'}}>Critical Path — {cpSet.size} items</div>
        <div style={{fontSize:11,color:'#f87171'}}>Delays on these items push the project end date directly. Check Schedule and Network tabs.</div>
      </div>
    </div>}
    {lvs.length>0&&<div style={{marginBottom:18}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--tx3)',marginBottom:5}}><span>Overall progress</span><span>{prog.toFixed(0)}%</span></div>
      <div className="prog-wrap"><div className="prog-fill" style={{width:`${prog}%`}}/></div>
    </div>}
    {deadlines.filter(d=>d.date).map(dl=>{
      const linked=scheduled.filter(s=>(dl.linkedItems||[]).includes(s.id));
      const maxEnd=linked.length>0?linked.reduce((m,s)=>s.endD>m?s.endD:m,new Date(0)):null;
      const isLate=maxEnd&&new Date(dl.date)&&maxEnd>new Date(dl.date);
      return<div key={dl.id} className={`dl-bar${dl.severity!=='critical'?' hi':''}`}>
        <span>⚑</span>
        <div style={{flex:1}}><div style={{fontWeight:600,fontSize:12}}>{dl.name} — {dl.date}</div><div style={{fontSize:11,color:'var(--tx3)'}}>{dl.description}</div></div>
        {isLate&&<span className="badge bc">⚠ At risk</span>}
        {!isLate&&maxEnd&&<span className="badge bd">✓ On track</span>}
      </div>;
    })}
    <div className="section-h">Effort by team</div>
    <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:18}}>
      {Object.entries(byT).sort().map(([t,d])=>{const team=teams.find(x=>x.id===t);
        return<div key={t} className="sum-card" style={{minWidth:140}}>
          <div style={{marginBottom:6}}><TBadge t={t} teams={teams}/></div>
          <div style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:600,color:team?.color||'var(--tx)'}}>{d.pt.toFixed(0)} PT</div>
          <div style={{fontSize:11,color:'var(--tx3)'}}>{d.t} tasks</div>
        </div>;})}
    </div>
    {tree.filter(r=>r.lvl===1).length>0&&<>
      <div className="section-h">Project breakdown</div>
      <table className="tree-tbl">
        <thead><tr><th>Project</th><th className="r">Best</th><th className="r">Realistic</th><th className="r">Worst</th></tr></thead>
        <tbody>{tree.filter(r=>r.lvl===1).map(r=>{const s=stats[r.id]||r;
          return<tr key={r.id} className="tr l1"><td><span className="tid">{r.id}</span><span style={{marginLeft:8}}>{r.name}</span></td>
            <td className="nc">{s._b?.toFixed(0)}</td><td className="nc g">{s._r?.toFixed(1)}</td><td className="nc">{s._w?.toFixed(0)}</td>
          </tr>;})}</tbody>
      </table>
    </>}
  </div>;
}

  const[f,setF]=useState({name:'',planStart:today,planEnd:twoY,holidays:'NRW'});
  const[ts,setTs]=useState([{id:'T1',name:'Frontend',color:'#3b82f6'},{id:'T2',name:'Backend',color:'#f43f5e'}]);
  const sf=(k,v)=>setF(x=>({...x,[k]:v}));
  const upT=(i,k,v)=>setTs(ts=>ts.map((t,j)=>j===i?{...t,[k]:v}:t));
  return<div className="overlay">
    <div className="modal modal-lg fade">
      <h2>New project</h2>
      <div className="field"><label>Project name</label>
        <input value={f.name} onChange={e=>sf('name',e.target.value)} placeholder="My project" autoFocus/>
      </div>
      <div className="frow">
        <div className="field"><label>Plan start</label><input type="date" value={f.planStart} onChange={e=>sf('planStart',e.target.value)}/></div>
        <div className="field"><label>Plan end</label><input type="date" value={f.planEnd} onChange={e=>sf('planEnd',e.target.value)}/></div>
        <div className="field"><label>Holidays</label>
          <select value={f.holidays} onChange={e=>sf('holidays',e.target.value)}>
            <option value="NRW">Germany — NRW</option><option value="none">None</option>
          </select>
        </div>
      </div>
      <hr className="divider"/>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--tx3)'}}>Teams</div>
        <button className="btn btn-sec btn-sm" onClick={()=>setTs(ts=>[...ts,{id:`T${ts.length+1}`,name:'',color:'#a78bfa'}])}>+ Team</button>
      </div>
      {ts.map((t,i)=><div key={i} className="frow" style={{alignItems:'flex-end',marginBottom:6}}>
        <div className="field" style={{flex:'0 0 70px'}}><label>ID</label><input value={t.id} onChange={e=>upT(i,'id',e.target.value)}/></div>
        <div className="field"><label>Name</label><input value={t.name} onChange={e=>upT(i,'name',e.target.value)} placeholder="Team name"/></div>
        <div className="field" style={{flex:'0 0 55px'}}><label>Color</label><input type="color" value={t.color} onChange={e=>upT(i,'color',e.target.value)}/></div>
        <div style={{marginBottom:12}}><button className="btn btn-danger btn-sm" onClick={()=>setTs(ts=>ts.filter((_,j)=>j!==i))}>x</button></div>
      </div>)}
      <div className="modal-footer">
        <button className="btn btn-sec" onClick={onClose}>Cancel</button>
        <button className="btn btn-pri" disabled={!f.name} onClick={()=>{
          if(!f.name)return;
          const planYears=[];for(let y=new Date(f.planStart).getFullYear();y<=new Date(f.planEnd).getFullYear();y++)planYears.push(y);
          const hols=f.holidays==='NRW'?computeNRW(planYears):[];
          onCreate({meta:{...f,version:'2'},teams:ts,members:[],deadlines:[],vacations:[],tree:[],holidays:hols});
        }}>Create project</button>
      </div>
    </div>
  </div>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const[data,setData]=useState(()=>{try{const s=localStorage.getItem(SK);return s?JSON.parse(s):null;}catch{return null;}});
  const[tab,setTab]=useState('summary');
  const[selected,setSel]=useState(null);
  const[modal,setModal]=useState(null);
  const[modalNode,setMN]=useState(null);
  const[search,setSearch]=useState('');
  const[saved,setSaved]=useState(true);
  const fRef=useRef(null);

  useEffect(()=>{
    if(!data)return;
    const t=setTimeout(()=>{localStorage.setItem(SK,JSON.stringify(data));setSaved(true);},800);
    return()=>clearTimeout(t);
  },[data]);

  const{tree=[],members=[],teams=[],deadlines=[],vacations=[],meta={}}=data||{};
  const hm=useMemo(()=>buildHMap(data?.holidays||[]),[data?.holidays]);
  const planStart=meta.planStart||iso(new Date());
  const planEnd=meta.planEnd||iso(new Date(new Date().getFullYear()+2,11,31));

  const{results:scheduled,weeks}=useMemo(()=>
    data?schedule(tree,members,vacations,planStart,planEnd,hm):{results:[],weeks:[]}
  ,[tree,members,vacations,planStart,planEnd,hm]);
  const stats=useMemo(()=>treeStats(tree),[tree]);
  const cpSet=useMemo(()=>cpm(tree).critical,[tree]);

  function setD(k,v){setData(d=>({...d,[k]:v}));setSaved(false);}
  function updateNode(u){setD('tree',tree.map(r=>r.id===u.id?u:r));}
  function deleteNode(id){setD('tree',tree.filter(r=>!r.id.startsWith(id)));setSel(null);}
  function addNode(node){
    const pid=node.id.split('.').slice(0,-1).join('.');
    const nt=[...tree];
    if(!pid){nt.push(node);}
    else{
      let ins=-1;
      for(let i=nt.length-1;i>=0;i--){if(nt[i].id===pid||nt[i].id.startsWith(pid+'.')){ins=i+1;break;}}
      ins>=0?nt.splice(ins,0,node):nt.push(node);
    }
    setD('tree',nt);
  }
  function updateMember(m){setD('members',members.map(x=>x.id===m.id?m:x));}
  function addMember(){
    const id='person'+(members.length+1);
    setD('members',[...members,{id,name:id,team:teams[0]?.id||'T1',role:'',cap:1.0,vac:25,start:planStart}]);
  }
  function deleteMember(id){setD('members',members.filter(m=>m.id!==id));}
  function onSeqUpdate(taskId,newSeq){setD('tree',tree.map(r=>r.id===taskId?{...r,seq:newSeq}:r));}

  function exportJSON(){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`${(meta.name||'project').toLowerCase().replace(/\s+/g,'-')}-${iso(new Date())}.json`;
    a.click();
  }
  function loadFile(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);if(!d.tree||!Array.isArray(d.tree))throw 0;setData(d);setTab('summary');setSel(null);}
      catch{alert('Invalid project file. Please load a valid Planr .json file.');}
    };
    r.readAsText(f);e.target.value='';
  }
  function onBarClick(s){
    const node=tree.find(r=>r.id===s.id);
    if(node){setMN({...node,...s});setModal('node');}
  }
  function newProject(){setData(null);setSel(null);setModal(null);setTab('summary');}

  if(!data)return<>
    <Onboard onCreate={()=>setModal('new')} onLoad={()=>fRef.current?.click()} fRef={fRef}/>
    {modal==='new'&&<NewProjModal onClose={()=>setModal(null)} onCreate={d=>{setData(d);setSaved(false);setModal(null);setTab('tree');}}/>}
    <input ref={fRef} type="file" accept=".json" style={{display:'none'}} onChange={loadFile}/>
  </>;

  const TABS=[
    {id:'summary',label:'Overview'},
    {id:'tree',label:'Work Tree'},
    {id:'gantt',label:'Schedule'},
    {id:'net',label:'Network'},
    {id:'deadlines',label:'Deadlines'},
    {id:'resources',label:'Resources'},
    {id:'holidays',label:'Holidays'},
  ];

  return<div className="app">
    <div className="topbar">
      <span className="logo" title="New project" onClick={()=>{if(!saved&&!confirm('Unsaved changes will be lost. Start new project?'))return;newProject();}}>Planr<span className="logo-dot">.</span></span>
      <div className="vsep"/>
      <span style={{fontSize:12,color:'var(--tx2)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{meta.name||'Untitled'}</span>
      <div className="vsep"/>
      <span style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--tx3)'}}>
        {scheduled.length} scheduled · {tree.filter(r=>r.lvl===3&&r.status==='done').length}/{tree.filter(r=>r.lvl===3).length} done
      </span>
      {cpSet?.size>0&&<span style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--re)',marginLeft:8}}>⚡ {cpSet.size} critical</span>}
      <div className="sp"/>
      {tab==='tree'&&<>
        <input className="btn btn-sec" style={{padding:'5px 10px',width:180}} placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <button className="btn btn-sec btn-sm" onClick={()=>setModal('add')}>+ Add</button>
        {selected&&<button className="btn btn-danger btn-sm" onClick={()=>{if(confirm(`Delete ${selected.id} and all children?`))deleteNode(selected.id);}}>Delete</button>}
      </>}
      {tab==='deadlines'&&<button className="btn btn-sec btn-sm" onClick={()=>setModal('deadlines')}>Edit</button>}
      <button className="btn btn-ghost btn-sm" onClick={()=>setModal('settings')} title="Project settings">⚙</button>
      <div className="vsep"/>
      <button className="btn btn-sec btn-sm" onClick={exportJSON} title="Export as JSON">↓ Export</button>
      <button className="btn btn-sec btn-sm" onClick={()=>fRef.current?.click()} title="Load project">↑ Load</button>
      <button className="btn btn-pri btn-sm" onClick={()=>{if(!saved&&!confirm('Unsaved changes will be lost. Start new?'))return;newProject();}} title="New project">New</button>
      <input ref={fRef} type="file" accept=".json" style={{display:'none'}} onChange={loadFile}/>
    </div>
    <div className="tab-bar">
      {TABS.map(t=><div key={t.id} className={`tab${tab===t.id?' on':''}`} onClick={()=>setTab(t.id)}>{t.label}</div>)}
      <div style={{flex:1}}/>
      {!saved&&<div style={{display:'flex',alignItems:'center',fontSize:11,color:'var(--tx3)',padding:'0 12px'}} className="saving">● saving…</div>}
    </div>
    <div className="main">
      {tab==='summary'&&<div className="pane"><SumView tree={tree} scheduled={scheduled} deadlines={deadlines} members={members} teams={teams} cpSet={cpSet}/></div>}
      {tab==='tree'&&<>
        <div className="pane-full"><div style={{flex:1,overflow:'auto'}}>
          {!tree.length
            ?<div className="empty" style={{marginTop:60}}>
              <div style={{fontSize:32,marginBottom:12}}>🌳</div>
              <div style={{fontSize:14,fontWeight:500,color:'var(--tx2)',marginBottom:8}}>No items yet</div>
              <div style={{fontSize:12,marginBottom:20}}>Build your work breakdown structure.</div>
              <button className="btn btn-pri" onClick={()=>setModal('add')}>+ Add first item</button>
            </div>
            :<TreeView tree={tree} selected={selected} onSelect={setSel} onDbl={n=>{setMN(n);setModal('node');}} search={search} stats={stats} teams={teams} cpSet={cpSet}
              onQuickAdd={parent=>{
                const id=nextChildId(tree,parent.id);
                const lvl=parent.lvl+1;
                const node={id,lvl,name:'New '+(lvl===2?'group':'task'),status:'open',team:parent.team||teams[0]?.id||'',best:lvl===3?5:0,factor:1.5,prio:2,seq:10,deps:[],note:'',assign:[]};
                addNode(node);setSel(node);
              }}/>
          }
        </div></div>
        {selected&&<div className="side fade">
          <div className="side-hdr"><h3>{selected.id}</h3>
            <button className="btn btn-ghost btn-icon sm" title="Full edit" onClick={()=>{setMN(selected);setModal('node');}}>⊞</button>
            <button className="btn btn-ghost btn-icon sm" onClick={()=>setSel(null)}>×</button>
          </div>
          <div className="side-body"><QuickEdit node={selected} tree={tree} members={members} teams={teams} cpSet={cpSet} onUpdate={n=>{updateNode(n);setSel(n);}}/></div>
        </div>}
      </>}
      {tab==='gantt'&&<div className="pane-full"><GanttView scheduled={scheduled} weeks={weeks} deadlines={deadlines} teams={teams} cpSet={cpSet} tree={tree} onBarClick={onBarClick} onSeqUpdate={onSeqUpdate}/></div>}
      {tab==='net'&&<div className="pane-full"><NetGraph tree={tree} scheduled={scheduled} teams={teams} cpSet={cpSet} onNodeClick={r=>onBarClick(r)}/></div>}
      {tab==='deadlines'&&<div className="pane"><DLView deadlines={deadlines} scheduled={scheduled} onEdit={()=>setModal('deadlines')}/></div>}
      {tab==='resources'&&<div className="pane"><ResView members={members} teams={teams} vacations={vacations} onUpd={updateMember} onAdd={addMember} onDel={deleteMember} onVac={v=>setD('vacations',v)}/></div>}
      {tab==='holidays'&&<div className="pane"><HolView holidays={data.holidays||[]} planStart={planStart} planEnd={planEnd} onUpdate={v=>setD('holidays',v)}/></div>}
    </div>
    {modal==='node'&&modalNode&&<NodeModal node={tree.find(r=>r.id===modalNode.id)||modalNode} tree={tree} members={members} teams={teams} scheduled={scheduled} cpSet={cpSet}
      onClose={()=>{setModal(null);setMN(null);}} onUpdate={n=>{updateNode(n);setSel(n);}} onDelete={deleteNode}/>}
    {modal==='add'&&<AddModal tree={tree} teams={teams} selected={selected} onAdd={addNode} onClose={()=>setModal(null)}/>}
    {modal==='settings'&&<SettingsModal meta={meta} teams={teams} onSave={(m,ts)=>{setD('meta',m);setD('teams',ts);}} onClose={()=>setModal(null)}/>}
    {modal==='deadlines'&&<DLModal deadlines={deadlines} tree={tree} onSave={v=>setD('deadlines',v)} onClose={()=>setModal(null)}/>}
    {modal==='new'&&<NewProjModal onClose={()=>setModal(null)} onCreate={d=>{setData(d);setSaved(false);setModal(null);setTab('tree');}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
